<script>
    const url = "https://script.google.com/macros/s/AKfycbzX8-vJYzfdwGECBsBSsHQgT1zNVNx8coPo9D9SRND1vb2A7H-Q9wph6_Wk3fTrC4vXPA/exec";
const selectedname = "egyptgods"; // Change this to your desired building name

// Show loading overlay
function showLoading() {
    document.getElementById('loading-overlay').style.display = 'flex';
}

// Hide loading overlay
function hideLoading() {
    document.getElementById('loading-overlay').style.display = 'none';
}

function populateData(data) {
    document.getElementById('title').src = data['Title'] || '';
    document.getElementById('description').innerText = data['Description'] || '';
    document.getElementById('banner').src = data['Banner'] || '';
    document.getElementById('sample1').src = data['Sample1'] || '';
    document.getElementById('sample2').src = data['Sample2'] || '';
    document.getElementById('sample3').src = data['Sample3'] || '';
    document.getElementById('sample4').src = data['Sample4'] || '';
    document.getElementById('sample5').src = data['Sample5'] || '';
    document.getElementById('sample6').src = data['Sample6'] || '';
    document.getElementById('sample7').src = data['Sample7'] || '';
    document.getElementById('sample8').src = data['Sample8'] || '';
    document.getElementById('sample9').src = data['Sample9'] || '';
    document.getElementById('sample10').src = data['Sample10'] || '';
}
// Start by showing the loading screen
showLoading();

if (selectedname) {
    fetch(`${url}?type=rowkey&rowkey=${selectedname}`)
        .then(response => response.json())
        .then(({ data }) => {
            console.log("Fetched Data:", data);
            populateData(data);
            hideLoading();
        })
        .catch(error => {
            console.error("Error fetching data:", error);
            hideLoading();
        });
} else {
    hideLoading();
}



    </script>

<script>
    const els = document.querySelectorAll("[type='radio']");
    for (const el of els)
        el.addEventListener("input", e => reorder(e.target, els));
    reorder(els[0], els);
    
    function reorder(targetEl, els) {
        const nItems = els.length;
        let processedUncheck = 0;
        for (const el of els) {
            const containerEl = el.nextElementSibling;
            if (el === targetEl) {
                containerEl.style.setProperty("--w", "100%");
                containerEl.style.setProperty("--l", "0");
            } else {
                containerEl.style.setProperty("--w", `${100/(nItems-1)}%`);
                containerEl.style.setProperty("--l", `${processedUncheck * 100/(nItems-1)}%`);
                processedUncheck += 1;
            }
        }
    }
</script>
